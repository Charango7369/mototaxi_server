<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa Mototaxis</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map {
height: 100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script>

// Crear mapa centrado en Apolo
var map = L.map('map').setView([-14.72, -68.42], 14);

// Cargar OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19
}).addTo(map);

// almacenar marcadores
var markers = {};

// función para actualizar conductores
async function updateDrivers(){

    const response = await fetch("/drivers");
    const drivers = await response.json();

    drivers.forEach(driver => {

        if(markers[driver.id]){

            markers[driver.id].setLatLng([driver.lat, driver.lon]);

        }else{

            markers[driver.id] = L.marker([driver.lat, driver.lon])
            .addTo(map)
            .bindPopup("Mototaxi "+driver.id);

        }

    });

}

// actualizar cada 2 segundos
setInterval(updateDrivers,2000);

// primera carga
updateDrivers();

</script>

</body>
</html>
