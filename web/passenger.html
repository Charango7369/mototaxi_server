<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mototaxi App</title>
  <style>
    body { font-family: Arial; margin:0; background:#f4f4f4; }
    header { background:#28a745; color:white; padding:15px; text-align:center; }
    .container { padding:20px; }
    button { padding:10px; margin:5px; border:none; background:#28a745; color:white; cursor:pointer; }
    input { padding:10px; margin:5px; width:90%; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:8px; }
  </style>
</head>
<body>

<header>
  <h2>Mototaxi - Cliente</h2>
</header>

<div class="container">
  <div class="card">
    <h3>Solicitar Viaje</h3>
    <input type="text" id="origen" placeholder="Ubicación origen">
    <input type="text" id="destino" placeholder="Destino">
    <button onclick="solicitarViaje()">Solicitar</button>
  </div>

  <div class="card">
    <h3>Estado del Viaje</h3>
    <p id="estado">Sin solicitudes</p>
  </div>
</div>

<script>
const API = "http://localhost:8000";

async function solicitarViaje(){
  const origen = document.getElementById('origen').value;
  const destino = document.getElementById('destino').value;

  const res = await fetch(`${API}/viajes/solicitar`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({origen, destino})
  });

  const data = await res.json();
  document.getElementById('estado').innerText = 'Viaje solicitado ID: ' + data.id;
}
</script>

</body>
</html>
