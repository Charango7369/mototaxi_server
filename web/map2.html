<!DOCTYPE html>
<html>
<head>

<title>Mototaxis Apolo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
height: 100vh;
width: 100%;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-14.720, -68.420], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OpenStreetMap'
}).addTo(map);

var markers = {};

async function loadDrivers() {

    let response = await fetch("/drivers");
    let drivers = await response.json();

    drivers.forEach(driver => {

        if (markers[driver.id]) {

            markers[driver.id].setLatLng([driver.lat, driver.lon]);

        } else {

            markers[driver.id] = L.marker([driver.lat, driver.lon])
                .addTo(map)
                .bindPopup("Mototaxi " + driver.id);

        }

    });

}

setInterval(loadDrivers, 3000);

</script>

</body>
</html>
