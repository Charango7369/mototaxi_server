<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MotoApolo — Panel Operador</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--bg:#0d0f12;--surface:#141720;--surface2:#1c2130;--border:#2a3045;--accent:#f5a623;--accent2:#3ecf8e;--danger:#e84040;--text:#e8eaf0;--muted:#6b7280;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;display:grid;grid-template-rows:48px 1fr;grid-template-columns:1fr 340px;overflow:hidden}
header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:20px}
.logo{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--accent);letter-spacing:.05em}
.logo span{color:var(--text)}
.ws-status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
.ws-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);transition:background .3s}
.ws-dot.connected{background:var(--accent2)}
.stats-bar{display:flex;gap:24px;margin-left:32px}
.stat{display:flex;align-items:baseline;gap:6px}
.stat-num{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:4px 10px;border-radius:4px;cursor:pointer;outline:none}
#map{background:#0a0c10;z-index:1}
.leaflet-container{background:#0a0c10!important}
aside{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column}
.section-title{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
#driver-list{overflow-y:auto;padding:8px 0;flex:1}
#driver-list::-webkit-scrollbar,#ride-list::-webkit-scrollbar,#event-log::-webkit-scrollbar{width:3px}
#driver-list::-webkit-scrollbar-thumb,#ride-list::-webkit-scrollbar-thumb,#event-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.driver-card{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid rgba(42,48,69,.5);transition:background .15s;cursor:pointer}
.driver-card:hover{background:var(--surface2)}
.driver-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.disponible{background:var(--accent2);box-shadow:0 0 6px var(--accent2)}
.ocupado{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.inactivo{background:var(--muted)}
.driver-info{flex:1;min-width:0}
.driver-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.driver-meta{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px}
.driver-estado{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em}
.estado-DISPONIBLE{background:rgba(62,207,142,.15);color:var(--accent2)}
.estado-OCUPADO{background:rgba(245,166,35,.15);color:var(--accent)}
#ride-list{max-height:200px;overflow-y:auto;padding:4px 0}
.ride-card{padding:8px 16px;border-bottom:1px solid rgba(42,48,69,.5)}
.ride-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.ride-id{font-family:var(--mono);font-size:11px;color:var(--accent)}
.ride-status{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:3px}
.status-ASIGNADO{background:rgba(62,207,142,.12);color:var(--accent2)}
.status-ACEPTADO{background:rgba(245,166,35,.12);color:var(--accent)}
.status-EN_VIAJE{background:rgba(99,130,220,.15);color:#8badff}
.ride-destino{font-size:12px;color:var(--text);margin-bottom:2px}
.ride-meta{font-family:var(--mono);font-size:10px;color:var(--muted)}
#event-log{height:110px;overflow-y:auto;padding:6px 16px;font-family:var(--mono);font-size:10px;color:var(--muted)}
.log-line{padding:2px 0;border-bottom:1px solid rgba(42,48,69,.3)}
.log-line .ts{color:var(--accent);margin-right:6px}
.log-line .msg{color:var(--text)}
.leaflet-popup-content-wrapper{background:var(--surface2)!important;border:1px solid var(--border)!important;border-radius:6px!important;color:var(--text)!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important}
.leaflet-popup-tip{background:var(--surface2)!important}
.popup-name{font-weight:600;font-size:13px;margin-bottom:4px}
.popup-row{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:10px;margin-top:2px}
.popup-row span{color:var(--text)}
</style>
</head>
<body>
<header>
  <div class="logo">MOTO<span>APOLO</span></div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="cnt-disponible">0</span><span class="stat-label">Disponibles</span></div>
    <div class="stat"><span class="stat-num" id="cnt-ocupado">0</span><span class="stat-label">En viaje</span></div>
    <div class="stat"><span class="stat-num" id="cnt-rides">0</span><span class="stat-label">Viajes hoy</span></div>
  </div>
  <select id="sindicato-filter" onchange="filterSindicato(this.value)">
    <option value="0">Todos los sindicatos</option>
    <option value="1">Sindicato 1</option>
    <option value="2">Sindicato 2</option>
    <option value="3">Sindicato 3</option>
    <option value="4">Sindicato 4</option>
    <option value="5">Sindicato 5</option>
  </select>
  <div class="ws-status">
    <div class="ws-dot" id="ws-dot"></div>
    <span id="ws-label">desconectado</span>
  </div>
</header>
<div id="map"></div>
<aside>
  <div class="sidebar-section" style="flex:0 0 auto">
    <div class="section-title">Conductores activos</div>
    <div id="driver-list"><div style="padding:8px;color:var(--muted);font-size:12px">Sin conductores conectados</div></div>
  </div>
  <div class="sidebar-section" style="flex:1;overflow:hidden">
    <div class="section-title">Viajes activos</div>
    <div id="ride-list"><div style="padding:4px 0;color:var(--muted);font-size:12px">Sin viajes activos</div></div>
  </div>
  <div class="sidebar-section" style="flex:0 0 auto;padding-bottom:14px">
    <div class="section-title">Eventos</div>
    <div id="event-log"></div>
  </div>
</aside>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const WS=`ws://${location.hostname}:8000/ws/operators`;
const drivers={};
let sindicatoFilter=0;
const map=L.map('map',{zoomControl:false}).setView([-14.7184,-68.4122],15);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'OSM/CARTO',maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);
function makeIcon(e){
  const c=e==='DISPONIBLE'?'#3ecf8e':e==='OCUPADO'?'#f5a623':'#6b7280';
  const b=e==='DISPONIBLE'?'rgba(62,207,142,0.2)':e==='OCUPADO'?'rgba(245,166,35,0.2)':'rgba(107,114,128,0.15)';
  return L.divIcon({html:`<div style="width:34px;height:34px;border-radius:50%;background:${b};border:2px solid ${c};display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 10px ${c}55">&#x1F3CD;</div>`,iconSize:[34,34],iconAnchor:[17,17],className:''});
}
function makePopup(d){
  return `<div style="font-family:sans-serif;font-size:12px">
    <div style="font-weight:600;font-size:13px;margin-bottom:4px;color:#e8eaf0">${d.nombre||'Conductor #'+d.driver_id}</div>
    <div style="color:#6b7280;font-family:monospace;font-size:10px;margin-top:2px">Placa: <span style="color:#e8eaf0">${d.placa||'—'}</span></div>
    <div style="color:#6b7280;font-family:monospace;font-size:10px;margin-top:2px">Sindicato: <span style="color:#e8eaf0">${d.sindicato_id||'—'}</span></div>
    <div style="color:#6b7280;font-family:monospace;font-size:10px;margin-top:2px">Estado: <span style="color:#e8eaf0">${d.estado||'DISPONIBLE'}</span></div>
    <div style="color:#6b7280;font-family:monospace;font-size:10px;margin-top:2px">Coords: <span style="color:#e8eaf0">${(d.lat||0).toFixed(5)}, ${(d.lon||0).toFixed(5)}</span></div>
  </div>`;
}
function conectarWS(){
  const ws=new WebSocket(WS);
  ws.onopen=()=>{document.getElementById('ws-dot').classList.add('connected');document.getElementById('ws-label').textContent='conectado';logEvento('Panel conectado');};
  ws.onmessage=(e)=>{const d=JSON.parse(e.data);if(d.driver_id!==undefined)actualizarConductor(d);};
  ws.onclose=()=>{document.getElementById('ws-dot').classList.remove('connected');document.getElementById('ws-label').textContent='reconectando...';setTimeout(conectarWS,3000);};
}
function actualizarConductor(data){
  const id=data.driver_id;
  if(drivers[id]){
    drivers[id].data={...drivers[id].data,...data};
    drivers[id].marker.setLatLng([data.lat,data.lon]);
    drivers[id].marker.setIcon(makeIcon(drivers[id].data.estado||'DISPONIBLE'));
    drivers[id].marker.setPopupContent(makePopup(drivers[id].data));
    logEvento('Conductor #'+id+' actualiza posicion');
  } else {
    const marker=L.marker([data.lat,data.lon],{icon:makeIcon('DISPONIBLE')}).addTo(map).bindPopup(makePopup(data));
    drivers[id]={data,marker};
    logEvento('Conductor #'+id+' aparece en el mapa');
  }
  renderDriverList();
  actualizarContadores();
}
function renderDriverList(){
  const list=document.getElementById('driver-list');
  const items=Object.values(drivers);
  if(!items.length){list.innerHTML='<div style="padding:8px;color:var(--muted);font-size:12px">Sin conductores conectados</div>';return;}
  list.innerHTML=items.map(({data:d})=>`<div class="driver-card" onclick="centrarConductor(${d.driver_id})">
    <div class="driver-dot ${(d.estado||'DISPONIBLE').toLowerCase()}"></div>
    <div class="driver-info">
      <div class="driver-name">${d.nombre||'Conductor #'+d.driver_id}</div>
      <div class="driver-meta">S${d.sindicato_id||'?'} &middot; ${d.placa||'sin placa'}</div>
    </div>
    <div class="driver-estado estado-${d.estado||'DISPONIBLE'}">${d.estado||'DISPONIBLE'}</div>
  </div>`).join('');
}
function actualizarContadores(){
  const vals=Object.values(drivers).map(d=>d.data.estado||'DISPONIBLE');
  document.getElementById('cnt-disponible').textContent=vals.filter(e=>e==='DISPONIBLE').length;
  document.getElementById('cnt-ocupado').textContent=vals.filter(e=>e==='OCUPADO').length;
}
function filterSindicato(val){
  sindicatoFilter=parseInt(val);
  Object.values(drivers).forEach(({data,marker})=>{
    if(sindicatoFilter===0||data.sindicato_id==sindicatoFilter)map.addLayer(marker);
    else map.removeLayer(marker);
  });
  renderDriverList();
}
function centrarConductor(id){const d=drivers[id];if(d){map.flyTo([d.data.lat,d.data.lon],17,{duration:.8});d.marker.openPopup();}}
function logEvento(msg){
  const log=document.getElementById('event-log');
  const now=new Date().toLocaleTimeString('es-BO',{hour12:false});
  const line=document.createElement('div');
  line.className='log-line';
  line.innerHTML='<span class="ts">'+now+'</span><span class="msg">'+msg+'</span>';
  log.insertBefore(line,log.firstChild);
  if(log.children.length>50)log.removeChild(log.lastChild);
}
conectarWS();
</script>
</body>
</html>
