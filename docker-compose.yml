# version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# mototaxi_server — Docker Compose
# Uso:
#   docker-compose up -d --build    ← primera vez
#   docker-compose up -d            ← siguientes veces
#   docker-compose logs -f backend  ← ver logs
#   docker-compose down             ← detener
# ─────────────────────────────────────────────────────────────────────────────
services:
  backend:
    build: .
    container_name: mototaxi_backend
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - mototaxi_data:/app/data
    environment:
      - PORT=8000
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mototaxi_data: